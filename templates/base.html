{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{% static 'img/icon-192.png' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="{% static 'img/vibeevents-icon.png' %}">
    <title>VibeEvents Palmas</title>
    
    {% block opengraph %}
    <meta property="og:title" content="VibeEvents Palmas">
    <meta property="og:description" content="Descubra os melhores eventos de Palmas e trace rotas em tempo real.">
    <meta property="og:type" content="website">
    {% endblock %}

    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#0b0f19">
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.8/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --vibe-bg: #0b0f19; --vibe-card: #121826; }
        body { background-color: var(--vibe-bg); color: white; font-family: 'Inter', sans-serif; }
        .vibe-card-auth { background: var(--vibe-card); border: 1px solid #222b3e; border-radius: 20px; }
    </style>
</head>
<body>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('{% static "sw.js" %}')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Erro no registro:', err));
            });
        }
    </script>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'bootstrap-5.3.8/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
