{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeEvents | Palmas</title>
    
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.8/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/mapa.css' %}" />

    <style>
        /* Layout de Tela Inicial */
        #main-container { 
            display: flex; 
            /* AJUSTE: Mudar de 70px para 120px */
            height: calc(100vh - 120px); 
            overflow: hidden; 
        }
        #sidebar { width: 350px; background: #121826; border-right: 1px solid #222b3e; padding: 20px; z-index: 1000; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; }
        
        .navbar-vibe { 
            background: #0b0f19; 
            border-bottom: 1px solid #222b3e; 
            padding: 10px 25px; 
            /* AJUSTE: Mudar de 70px para 120px */
            height: 110px; 
        }
        .filter-badge { cursor: pointer; transition: 0.3s; border: 1px solid #222b3e; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px; display: inline-block; }
        .filter-badge:hover, .filter-badge.active { background: #7DACFD; color: #0b0f19; border-color: #7DACFD; }
    </style>
</head>
<body>
        {% if messages %}
    <div class="toast-container position-fixed top-0 end-0 p-3">
        {% for message in messages %}
        <div class="toast show align-items-center text-bg-success border-0">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}


        <nav class="navbar navbar-vibe d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <img src="{% static 'img/vibeevents-icon.png' %}" alt="Logo" style="height: 120px;">
            </div>

            <div class="d-flex gap-2">
                
                <!-- 🔥 BOTÃO PÚBLICO -->
                <a href="{% url 'sugerir_evento' %}" class="btn btn-primary rounded-pill">
                    <i class="bi bi-send me-1"></i> Sugerir Evento
                </a>

                <!-- 🔒 BOTÃO ADMIN -->
                <a href="{% url 'curadoria_novo' %}" class="btn btn-outline-light btn-sm rounded-pill">
                    <i class="bi bi-shield-lock me-1"></i> Curadoria
                </a>

            </div>
        </nav>

    <div id="main-container">
        <aside id="sidebar">
            <h6 class="text-muted text-uppercase small letter-spacing-1 mb-3">Impacto Social</h6>
            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" id="filter-solidario" onchange="filterChange()">
                <label class="form-check-label text-white" for="filter-solidario">Apenas Eventos Solidários ❤️</label>
            </div>

            <h6 class="text-muted text-uppercase small letter-spacing-1 mb-3">Explorar Categorias</h6>
            <div class="mb-4"> <div class="filter-badge active" data-cat="ALL" onclick="updateCategory(this)">Todos</div>
                <div class="filter-badge" data-cat="MUSI" onclick="updateCategory(this)"><i class="bi bi-music-note"></i> Música</div>
                <div class="filter-badge" data-cat="CULT" onclick="updateCategory(this)"><i class="bi bi-palette"></i> Cultura</div>
                <div class="filter-badge" data-cat="ESPO" onclick="updateCategory(this)"><i class="bi bi-trophy"></i> Esporte</div>
                <div class="filter-badge" data-cat="EMPR" onclick="updateCategory(this)"><i class="bi bi-briefcase"></i> Empreendedorismo</div>
            </div>

            <hr class="border-secondary">
            
            <h6 class="text-muted text-uppercase small letter-spacing-1 mb-3">Eventos Disponíveis</h6>
            <div id="event-list-container"> </div>
        </aside>
        <div id="map"></div>
    </div>

    {{ eventos_js|json_script:"eventos-data" }}

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{% static 'js/mapa.js' %}"></script>
    
    <script>
        // Variável global para controle de estado
        let currentCategory = 'ALL';

        // 1. Função para atualizar a lista lateral (A QUE ESTAVA FALTANDO)
        function atualizarListaLateral(cat, solidario) {
            const data = JSON.parse(document.getElementById('eventos-data').textContent);
            const filtrados = data.filter(ev => {
                const bateCat = (cat === 'ALL' || ev.categoria === cat);
                const bateSol = (!solidario || ev.is_beneficente);
                return bateCat && bateSol;
            });

            const listContainer = document.getElementById('event-list-container');
            if (listContainer) {
                listContainer.innerHTML = filtrados.map(ev => `
                    <div class="card mb-3 bg-dark border-secondary">
                        <div class="card-body p-3">
                            <h6 class="mb-1 text-white">${ev.nome}</h6>
                            <p class="text-muted small mb-2">${ev.nome_local}</p>
                            <span class="badge bg-primary rounded-pill" style="font-size: 10px;">${ev.categoria}</span>
                            ${ev.is_beneficente ? '<span class="ms-2">❤️</span>' : ''}
                        </div>
                    </div>
                `).join('') || '<p class="text-muted small">Nenhum evento encontrado.</p>';
            }
        }

        // 2. Função disparada quando muda o filtro (Switch ou Categoria)
        function filterChange() {
            const isSolidario = document.getElementById('filter-solidario').checked;
            
            // Chama a função global definida no mapa.js
            if (window.aplicarFiltros) {
                window.aplicarFiltros(currentCategory, isSolidario);
            }
            atualizarListaLateral(currentCategory, isSolidario);
        }

        // 3. Função para trocar categoria
        function updateCategory(element) {
            document.querySelectorAll('.filter-badge').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentCategory = element.getAttribute('data-cat');
            filterChange();
        }

        // 4. Inicialização única ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(document.getElementById('eventos-data').textContent);
            
            // Inicializa o mapa
            initMap('map', data);
            
            // Popula a lista pela primeira vez
            atualizarListaLateral('ALL', false);
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toasts = document.querySelectorAll('.toast');
            if (toasts.length > 0) {
                setTimeout(() => {
                    toasts.forEach(t => t.remove());
                }, 4000);
            }
        });
    </script>
</body>
</html>

<script>
    // Defina as funções globais fora do DOMContentLoaded
    function filterChange() {
        const isSolidario = document.getElementById('filter-solidario').checked;
        const currentCategory = document.querySelector('.filter-badge.active').getAttribute('data-cat');
        
        if (window.aplicarFiltros) {
            window.aplicarFiltros(currentCategory, isSolidario);
        }
        atualizarListaLateral(currentCategory, isSolidario);
    }

    // Chame o initMap apenas uma vez aqui
    document.addEventListener('DOMContentLoaded', () => {
        const data = JSON.parse(document.getElementById('eventos-data').textContent);
        
        // Verifica se os elementos existem antes de rodar
        if (document.getElementById('map')) {
            initMap('map', data);
        }
        
        if (document.getElementById('event-list')) {
            atualizarListaLateral('ALL', false);
        }
    });
</script>
