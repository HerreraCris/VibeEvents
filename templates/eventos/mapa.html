{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeEvents | Palmas</title>
    
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.8/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="{% static 'css/mapa.css' %}" />

    <style>
        #main-container { display: flex; height: calc(100vh - 110px); overflow: hidden; }
        #sidebar { width: 350px; background: #121826; border-right: 1px solid #222b3e; padding: 20px; z-index: 1000; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; position: relative; }
        
        .navbar-vibe { background: #0b0f19; border-bottom: 1px solid #222b3e; padding: 10px 25px; height: 110px; }        .filter-badge { cursor: pointer; transition: 0.3s; border: 1px solid #222b3e; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px; display: inline-block; text-decoration: none; color: white; }
        .filter-badge:hover, .filter-badge.active { background: #7DACFD; color: #0b0f19; border-color: #7DACFD; }
 
        @media (max-width: 768px) {
            .navbar-vibe { height: 80px; padding: 5px 15px; }
            #main-container { height: calc(100vh - 80px); }
            #sidebar { display: none; } /* Esconde a sidebar fixa no mobile */
        }
 
        .btn-periodo {
            background: #161e2e;
            color: #7DACFD;
            border: 1px solid #7DACFD;
            padding: 6px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 5px;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-periodo:hover, .btn-periodo.active { background: #7DACFD; color: #101624; }
        .btn-periodo.fav-active { background: #ff4757; color: white; border-color: #ff4757; }

        .letter-spacing-1 { letter-spacing: 1px; }

        .btn-favorito {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 0;
        }
        .btn-favorito.is-fav { color: #ff4757 !important; }
    </style>
    <script src="{% static 'bootstrap-5.3.8/js/bootstrap.bundle.min.js' %}"></script>
</head>
<body>

    <nav class="navbar navbar-vibe d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <!-- Botão Menu Mobile -->
            <button class="btn btn-outline-light d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar">
                <i class="bi bi-list" style="font-size: 1.5rem;"></i>
            </button>
            <img src="{% static 'img/vibeevents-icon.png' %}" alt="Logo" style="height: 70px; width: auto" class="me-3">
        </div>
        <a href="{% url 'sugerir_evento' %}" class="btn btn-outline-light btn-sm rounded-pill d-none d-sm-block">
            <i class="bi bi-plus-circle me-1"></i> Sugerir Evento
        </a>
    </nav>

<div id="main-container">
        <!-- Sidebar Desktop -->
        <aside id="sidebar" class="d-none d-md-block">
            {% include 'eventos/sidebar_content.html' %}
        </aside>

        <!-- Sidebar Mobile (Offcanvas) -->
        <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="offcanvasSidebar" style="width: 300px;">
            <div class="offcanvas-header border-bottom border-secondary">
                <h5 class="offcanvas-title">Filtros e Eventos</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                {% include 'eventos/sidebar_content.html' %}
            </div>
        </div>

        <div id="map">
            <button onclick="window.localizarUsuario()" 
                class="btn btn-light shadow-sm" 
                style="position: absolute; bottom: 20px; right: 20px; z-index: 1000; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-crosshair" style="font-size: 1.5rem; color: #007bff;"></i>
            </button>
        </div>
    </div>
    
    {{ eventos_js|json_script:"eventos-data" }}


<script>
    window.VIBE_INTERESSES = {{ interesses_usuario|safe|default:"[]" }};
</script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="{% static 'js/mapa.js' %}?v={% now 'U' %}"></script>
    <script>
        window.getFavoritos = window.getFavoritos || function() {
            return JSON.parse(localStorage.getItem('vibe_favs')) || [];
        };

        let currentCategory = 'ALL';
        let apenasFavoritos = false;

        function toggleFavorito(eventoId) {
            // Chama a função única do mapa.js
            if (typeof window.gerenciarFavoritoMapa === 'function') {
                window.gerenciarFavoritoMapa(eventoId);
            }
        }
        function toggleFiltroFavoritos() {
            apenasFavoritos = !apenasFavoritos;
            const btn = document.getElementById('btn-show-favs');
            if (btn) btn.classList.toggle('fav-active', apenasFavoritos);
            filterChange();
        }

        function atualizarListaLateral(cat, solidario) {
            const dataEl = document.getElementById('eventos-data');
            if (!dataEl) return;
            
            const data = JSON.parse(dataEl.textContent);
            // Agora o getFavoritos já está garantido pela "Rede de Segurança" acima
            const favs = window.getFavoritos();

            const filtrados = data.filter(ev => {
                const bateCat = (cat === 'ALL' || ev.categoria === cat);
                const bateSol = (!solidario || ev.is_beneficente);
                const bateFav = (!apenasFavoritos || favs.includes(ev.id.toString()));
                return bateCat && bateSol && bateFav;
            });

            const listContainer = document.getElementById('event-list-container');
            if (listContainer) {
                if (filtrados.length === 0) {
                    listContainer.innerHTML = '<p class="text-muted small p-3">Nenhum evento encontrado.</p>';
                } else {
                    listContainer.innerHTML = filtrados.map(ev => {
                        const isFav = favs.includes(ev.id.toString());
                        return `
                        <div class="card mb-3 bg-dark border-secondary shadow-sm">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="mb-1 text-white">${ev.nome}</h6>
                                    <button class="btn-favorito ${isFav ? 'is-fav' : ''}" onclick="toggleFavorito('${ev.id}')">
                                        <i class="bi ${isFav ? 'bi-heart-fill' : 'bi-heart'}"></i>
                                    </button>
                                </div>
                                <p class="text-muted small mb-1">${ev.nome_local}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge bg-primary rounded-pill" style="font-size: 10px;">${ev.categoria}</span>
                                    <span class="text-muted small" style="font-size: 10px;">
                                        ${new Date(ev.data_evento).toLocaleDateString('pt-BR')}
                                    </span>
                                </div>
                                ${ev.is_beneficente ? '<div class="mt-2 text-warning small">❤ Evento Solidário</div>' : ''}
                            </div>
                        </div>`;
                    }).join('');
                }
            }
        }

    function filterChange() {
        const switchSolidario = document.querySelector('#filter-solidario:checked');
        const isSolidario = switchSolidario !== null;
        
        if (window.aplicarFiltros) {
            window.aplicarFiltros(currentCategory, isSolidario, apenasFavoritos);
        }
        atualizarListaLateral(currentCategory, isSolidario);
    }

        function updateCategory(element) {
            document.querySelectorAll('.filter-badge').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentCategory = element.getAttribute('data-cat');
            filterChange();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dataEl = document.getElementById('eventos-data');
            if (dataEl) {
                const data = JSON.parse(dataEl.textContent);
                if (typeof initMap === 'function') {
                    initMap('map', data);
                }
                atualizarListaLateral('ALL', false);
            }
        });
    </script>
</body>
</html>
