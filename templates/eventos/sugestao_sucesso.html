{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso | VibeEvents</title>
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.8/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .success-card {
            background: #121826;
            border: 1px solid #222b3e;
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(125, 172, 253, 0.1);
            color: #7DACFD;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
            border: 2px solid #7DACFD;
        }
        .vibe-accent { color: #7DACFD; }
        .btn-home {
            background: #7DACFD;
            color: #0b0f19;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px 30px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: #93b9ff;
            transform: translateY(-2px);
        }
        .countdown {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <i class="bi bi-check2-all"></i>
        </div>
        <h2 class="fw-bold mb-3">Sugestão <span class="vibe-accent">Enviada!</span></h2>
        <p class="mb-4 text-muted">
            Obrigado por contribuir com a nossa curadoria. 
            Sua experiência está em análise e aparecerá no mapa assim que for aprovada.
        </p>
        
        <a href="{% url 'mapa_eventos' %}" class="btn-home">Voltar Agora</a>
        
        <p class="countdown">
            Redirecionando automaticamente em <span id="timer">5</span> segundos...
        </p>
    </div>

    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = "{% url 'mapa_eventos' %}";
            }
        }, 1000);
    </script>
</body>
</html>
