{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="vibe-card-auth text-white p-4 shadow-sm" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold mb-4">Entrar no VibeEvents</h2>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger p-2 small">
                    E-mail ou senha incorretos. Por favor, tente novamente.
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label small text-muted">Usuário ou E-mail</label>
                <input type="text" name="username" class="form-control form-control-lg bg-dark border-secondary text-white" id="id_username" required>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label small text-muted">Senha</label>
                <input type="password" name="password" class="form-control form-control-lg bg-dark border-secondary text-white" id="id_password" required>
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mb-3" style="background-color: #7DACFD; border: none; color: #0b0f19; font-weight: bold;">
                Acessar Conta
            </button>
        </form>

        <div class="text-center mt-4 pt-2 border-top border-secondary">
            <p class="small mb-2" style="color: #94a3b8 !important;">
                Não tem uma conta? 
                <a href="{% url 'registro' %}" class="text-decoration-none fw-bold" style="color: #7DACFD !important;">Criar conta em Palmas</a>
            </p>
            <a href="{% url 'mapa_eventos' %}" class="text-decoration-none d-block mt-3 small fw-semibold" style="color: #e2e8f0 !important; letter-spacing: 0.5px;">
                Continuar como convidado
            </a>
        </div>
    </div>
</div>
{% endblock %}
