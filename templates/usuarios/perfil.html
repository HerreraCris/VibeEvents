{% extends 'base.html' %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'mapa_eventos' %}" class="btn btn-outline-light rounded-circle me-3" style="width: 44px; height: 44px;">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="h4 mb-0">Meu Perfil</h2>
    </div>

    <form method="post" class="vibe-card-auth p-4 shadow">
        {% csrf_token %}
        
        <label class="form-label fw-bold text-muted small mb-3">O QUE VOCÊ CURTE EM PALMAS?</label>
        
        <div class="row g-3 mb-4">
            {% for sigla, nome in categorias %}
            <div class="col-6">
                <input type="checkbox" class="btn-check" name="interesses" id="cat_{{ sigla }}" 
                    value="{{ sigla }}" {% if sigla in perfil.interesses %}checked{% endif %}>
                <label class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center text-center" 
                    for="cat_{{ sigla }}" style="min-height: 60px; border-radius: 12px; font-weight: 500;">
                    {{ nome }}
                </label>
            </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100 shadow" style="min-height: 55px; border-radius: 15px;">
            Salvar Preferências
        </button>
    </form>
    
    <div class="text-center mt-4">
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-link text-danger text-decoration-none">Sair da conta</button>
        </form>
    </div>
</div>

<style>
    /* Estilo para facilitar o feedback vis ual do toque */
    .btn-check:checked + .btn-outline-primary {
        background-color: #7DACFD !important;
        color: #0b0f19 !important;
        border-color: #7DACFD !important;
        transform: scale(0.98);
    }
</style>
{% endblock %}
